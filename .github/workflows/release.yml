name: Release web-vue

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release.yml
      - .npmrc
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - packages/sd-vue-scripts/**
      - packages/web-vue/**
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-web-vue-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Init
        run: pnpm run init

      - name: Build sd-vue-scripts
        run: pnpm --filter @sd-design/sd-vue-scripts run build

      - name: Build web-vue
        run: pnpm --filter @sdata/web-vue run build

      - name: Release web-vue
        working-directory: packages/web-vue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release
