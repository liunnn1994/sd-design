name: Release web-vue

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release.yml
      - netlify.toml
      - .npmrc
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - packages/sd-vue-docs/**
      - packages/web-vue/**
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-web-vue-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
          scope: '@sdata'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Init
        run: pnpm run init

      - name: Build web-vue
        run: pnpm --filter @sdata/web-vue run build

      - name: Release web-vue
        working-directory: packages/web-vue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release

      - name: Trigger Netlify docs build hook
        if: success()
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          test -n "$NETLIFY_BUILD_HOOK_URL" || { echo 'Missing NETLIFY_BUILD_HOOK_URL secret'; exit 1; }
          curl -X POST -fsS "$NETLIFY_BUILD_HOOK_URL"
